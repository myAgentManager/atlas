# One-click Render blueprint: free web service. Pair with a free Postgres
# (Neon or Supabase) by setting DATABASE_URL — then users, tasks, and every
# account's private files live in the cloud database and survive restarts.
services:
  - type: web
    name: myagent
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix web && npm run build --prefix web
    startCommand: node server/index.js
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL # paste your Neon/Supabase connection string
        sync: false
      - key: ADMIN_CODE # change from the default before going live
        sync: false
      - key: ADMIN_MOUNT # single-port host → Operations console at /atlas-operations
        value: path
      - key: TRUST_PROXY
        value: "1"
      - key: NODE_VERSION
        value: "22"
