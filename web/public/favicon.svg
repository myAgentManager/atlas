<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Atlas Network mark: the globe with network lines. Static, hand-drawn. -->
  <defs>
    <radialGradient id="sea" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#8df2e6"/>
      <stop offset="45%" stop-color="#2bc9b8"/>
      <stop offset="100%" stop-color="#0a3940"/>
    </radialGradient>
    <clipPath id="disc"><circle cx="32" cy="32" r="26"/></clipPath>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#0b0e13"/>
  <circle cx="32" cy="32" r="26" fill="url(#sea)"/>
  <g clip-path="url(#disc)">
    <!-- landmass silhouettes, abstracted -->
    <g fill="#0e5c52" opacity="0.85">
      <path d="M14 22c3-5 9-7 13-5s2 6 6 6 7-3 10-1 3 6 0 8-8 1-11 4-7 2-10-1-10-6-8-11Z"/>
      <path d="M36 42c4-2 9 0 10 4s-2 8-6 8-8-3-8-7c0-3 2-4 4-5Z"/>
      <path d="M16 40c3 0 5 3 4 6s-5 4-7 2-1-8 3-8Z"/>
    </g>
    <!-- graticule -->
    <g fill="none" stroke="#04161a" stroke-opacity="0.4" stroke-width="1">
      <ellipse cx="32" cy="32" rx="26" ry="9"/>
      <ellipse cx="32" cy="32" rx="26" ry="19"/>
      <ellipse cx="32" cy="32" rx="9" ry="26"/>
      <ellipse cx="32" cy="32" rx="19" ry="26"/>
    </g>
    <!-- network lines -->
    <g fill="none" stroke="#eafffb" stroke-linecap="round">
      <path d="M18 40 Q 28 20 44 26" stroke-width="2"/>
      <path d="M22 26 Q 34 22 42 40" stroke-width="1.5" stroke-opacity="0.7"/>
      <path d="M20 46 Q 34 40 46 46" stroke-width="1.3" stroke-opacity="0.55"/>
    </g>
    <g fill="#ffffff">
      <circle cx="18" cy="40" r="2.4"/>
      <circle cx="44" cy="26" r="2.8"/>
      <circle cx="22" cy="26" r="2"/>
      <circle cx="42" cy="40" r="2.2"/>
      <circle cx="46" cy="46" r="1.8"/>
    </g>
  </g>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#34e3d0" stroke-opacity="0.55" stroke-width="1.5"/>
</svg>
