<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Atlas Networks mark: glossy deep-blue globe, white continents, gel
       highlight. Transparent outside the sphere. -->
  <defs>
    <radialGradient id="sea" cx="36%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#3f7fca"/>
      <stop offset="45%" stop-color="#1e4f96"/>
      <stop offset="80%" stop-color="#0e2a5c"/>
      <stop offset="100%" stop-color="#081a3d"/>
    </radialGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="disc"><circle cx="32" cy="32" r="28"/></clipPath>
  </defs>
  <circle cx="32" cy="32" r="28" fill="url(#sea)"/>
  <g clip-path="url(#disc)" fill="#f4f8fd">
    <path d="M20 14c4-3 9-2 11 1s0 6 3 7 8-1 10 2 1 6-2 7-7 0-9 3-1 7-4 8-7-1-8-5 1-6-1-9-6-3-6-7 3-5 6-7Z"/>
    <path d="M45 12c3-1 8 0 10 3l1 3c-3 2-7 2-9-1s-4-4-2-5Z" opacity=".95"/>
    <path d="M27 45c3-1 6 1 6 4s-2 6-5 6-5-3-4-6 1-3 3-4Z"/>
    <path d="M48 40c3 0 6 3 5 6s-5 4-7 1 0-7 2-7Z" opacity=".9"/>
  </g>
  <ellipse cx="25" cy="17" rx="16" ry="9" fill="url(#gloss)" opacity="0.75"/>
  <circle cx="41" cy="14" r="3.2" fill="#ffffff" opacity="0.85"/>
  <circle cx="32" cy="32" r="27.4" fill="none" stroke="#7db4e8" stroke-opacity="0.35" stroke-width="1"/>
</svg>
